<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Dr. Parth Chaudhari</title>
  <meta name="description" content="The page you are looking for does not exist. Return to Dr. Parth Chaudhari's portfolio.">
  <link rel="canonical" href="https://parthchaudhari.com/">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #FAF8F5;
      --navy: #1A2744;
      --navy-muted: #5A6A82;
      --teal: #0D9488;
      --teal-dark: #0F766E;
      --white: #FFFFFF;
      --radius: 12px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font);
      background-color: var(--cream);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      color: var(--teal);
      line-height: 1;
      margin-bottom: 1rem;
      opacity: 0.2;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    .error-text {
      font-size: 1rem;
      color: var(--navy-muted);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 600;
      font-size: 0.875rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      text-decoration: none;
      transition: all 200ms ease;
    }
    .btn--primary {
      background-color: var(--teal);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(13, 148, 136, 0.25);
    }
    .btn--primary:hover {
      background-color: var(--teal-dark);
      transform: translateY(-1px);
    }
    .btn--ghost {
      background-color: transparent;
      color: var(--navy);
      border: 1.5px solid #E8E4DF;
      margin-left: 0.5rem;
    }
    .btn--ghost:hover {
      border-color: var(--teal);
      color: var(--teal);
    }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      color: var(--navy-muted);
    }
    .footer a {
      color: var(--navy-muted);
      text-decoration: underline;
    }
    .footer a:hover {
      color: var(--teal);
    }
    @media (min-width: 768px) {
      .error-code { font-size: 8rem; }
      .error-title { font-size: 1.875rem; }
    }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <h1 class="error-title">Page not found</h1>
  <p class="error-text">
    The page you are looking for does not exist or has been moved.
    Return to the portfolio or explore DVMReady.
  </p>
  <div>
    <a href="/" class="btn btn--primary">← Back to Portfolio</a>
    <a href="https://dvmready.com" class="btn btn--ghost">Explore DVMReady</a>
  </div>
  <footer class="footer">
    <p>Dr. Parth Chaudhari · <a href="/">parthchaudhari.com</a></p>
  </footer>
</body>
</html>
